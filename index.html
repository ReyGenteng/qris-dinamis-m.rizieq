<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRIS Dinamis Generator</title>
    <!-- Library untuk generate gambar QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: #555;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea {
            resize: vertical;
            height: 80px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
        #qrcode-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #qrcode {
            padding: 10px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .result-text {
            margin-top: 15px;
            font-size: 12px;
            color: #666;
            word-break: break-all;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #eee;
            max-height: 60px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>QRIS Dinamis Generator 💸</h2>
    
    <!-- Input Teks QRIS Statis Bebas -->
    <div class="input-group">
        <label for="qrisStatis">Masukkan Teks/Payload QRIS Asli:</label>
        <textarea id="qrisStatis" placeholder="Contoh: 0002010102112657..."></textarea>
    </div>

    <!-- Input Nominal Pembayaran -->
    <div class="input-group">
        <label for="nominal">Nominal Pembayaran (Rupiah):</label>
        <input type="number" id="nominal" placeholder="Contoh: 5000" min="1">
    </div>

    <button onclick="prosesQRIS()">Buat QRIS Dinamis</button>

    <!-- Tempat QR Code Muncul -->
    <div id="qrcode-container" style="display: none;">
        <div id="qrcode"></div>
        <div class="result-text" id="payloadHasil"></div>
    </div>
</div>

<script>
    let qrcodeInstance = null;

    function prosesQRIS() {
        const qrisStatis = document.getElementById('qrisStatis').value.trim();
        const nominal = document.getElementById('nominal').value.trim();

        if (!qrisStatis || !nominal) {
            alert('Harap isi teks QRIS dan nominalnya terlebih dahulu, Mak!');
            return;
        }

        // 1. Ubah indikator statis (11) menjadi dinamis (12) secara aman
        let qrisBase = qrisStatis.replace(/010211/i, "010212");
        
        // 2. Potong string sampai sebelum penanda CRC "6304" (case-insensitive)
        const indexCRC = qrisBase.toUpperCase().indexOf("6304");
        if (indexCRC !== -1) {
            qrisBase = qrisBase.substring(0, indexCRC);
        } else {
            alert('Format QRIS tidak valid atau penanda CRC tidak ditemukan!');
            return;
        }
        
        // 3. Buat tag nominal (Tag 54) sesuai aturan EMVCo
        const stringNominal = nominal.toString();
        const panjangNominal = stringNominal.length.toString().padStart(2, '0');
        const tagNominal = "54" + panjangNominal + stringNominal;
        
        // 4. Cari posisi tag mata uang "5802ID" secara aman (bisa huruf besar/kecil)
        const posisiSisip = qrisBase.toUpperCase().indexOf("5802ID");
        if (posisiSisip === -1) {
            alert('Tag mata uang (5802ID) tidak ditemukan dalam string QRIS! Pastikan teks QRIS disalin secara lengkap.');
            return;
        }
        
        // Selipkan tag nominal tepat sebelum tag 5802ID
        let qrisDinamis = qrisBase.slice(0, posisiSisip) + tagNominal + qrisBase.slice(posisiSisip);
        
        // 5. Tambahkan kembali penanda CRC "6304" di akhir
        qrisDinamis += "6304";
        
        // 6. Hitung nilai checksum CRC16 yang baru
        const crcBaru = hitungCRC16(qrisDinamis);
        
        // 7. Gabungkan string final
        const qrisFinal = qrisDinamis + crcBaru;

        // Tampilkan kontainer hasil dan teks payload-nya
        document.getElementById('qrcode-container').style.display = 'flex';
        document.getElementById('payloadHasil').innerText = qrisFinal;

        // 8. Gambar ulang atau buat QR Code baru
        const qrcodeDiv = document.getElementById("qrcode");
        qrcodeDiv.innerHTML = ""; 
        
        qrcodeInstance = new QRCode(qrcodeDiv, {
            text: qrisFinal,
            width: 200,
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.M
        });
    }

    // Fungsi hitung CRC16 standar QRIS / EMVCo
    function hitungCRC16(str) {
        let crc = 0xFFFF;
        for (let c = 0; c < str.length; c++) {
            let code = str.charCodeAt(c);
            crc ^= (code << 8);
            for (let i = 0; i < 8; i++) {
                if (crc & 0x8000) {
                    crc = (crc << 1) ^ 0x1021;
                } else {
                    crc = crc << 1;
                }
            }
        }
        crc = crc & 0xFFFF;
        return crc.toString(16).toUpperCase().padStart(4, '0');
    }
</script>

</body>
</html>
